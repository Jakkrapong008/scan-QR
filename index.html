<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="เครื่องมือสแกน QR Code ใช้งานง่าย รองรับทั้งการลากคลุมหน้าจอและการวางรูปภาพ (Ctrl+V)">
    <meta property="og:title" content="สแกน QR Code บนเว็บ">
    <meta property="og:description" content="สแกน QR Code ได้ทันทีด้วยการลากคลุมจอ หรือกด Ctrl+V วางรูปภาพ">
    <meta property="og:type" content="website">
    
    <title>เครื่องมือสแกน QR Code (Modern UI)</title>
    
    <!-- นำเข้าฟอนต์ Sarabun จาก Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- ตั้งค่า Tailwind ให้ใช้ฟอนต์ Sarabun เป็นหลัก -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Sarabun', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* แอนิเมชันปุ่มสั่นเบาๆ ตอนเริ่ม */
        .hover-float { transition: transform 0.3s ease, box-shadow 0.3s ease; }
        .hover-float:hover { transform: translateY(-4px); box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.2); }

        /* ซ่อน Scrollbar เมื่อเปิดโหมดสแกนเต็มจอ */
        body.cropping { overflow: hidden; }
        
        #crop-canvas {
            cursor: crosshair;
            display: block;
        }

        /* ตกแต่ง Scrollbar ให้ดูโมเดิร์น (สำหรับเนื้อหายาวๆ) */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-slate-200 min-h-screen flex flex-col items-center justify-center p-4 text-slate-800 transition-colors selection:bg-blue-200 selection:text-blue-900">

    <!-- หน้าต่างหลัก (ดีไซน์กระจกขุ่นนิดๆ และมุมโค้งมนมาก) -->
    <div class="max-w-md w-full bg-white/90 backdrop-blur-xl rounded-[2rem] shadow-[0_20px_50px_-12px_rgba(0,0,0,0.1)] border border-white overflow-hidden relative z-10">
        
        <!-- Header (ดีไซน์ใหม่ แยกสีพื้นหลังออก ใช้ Gradient กับไอคอน) -->
        <div class="pt-8 pb-4 px-6 text-center">
            <div class="w-16 h-16 mx-auto bg-gradient-to-tr from-blue-500 to-indigo-600 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-500/30 mb-5 transform -rotate-3 hover:rotate-0 transition-transform duration-300">
                <i data-lucide="qr-code" class="w-8 h-8 text-white"></i>
            </div>
            <h1 class="text-2xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-slate-800 to-slate-500 tracking-tight">สแกน QR Code</h1>
            <p class="text-slate-500 text-sm mt-1.5 font-medium">เลือกวิธีสแกนที่คุณสะดวกที่สุด</p>
        </div>

        <!-- แท็บเมนู (แบบ Pill Shape ทันสมัย) -->
        <div class="px-6 mb-2">
            <div class="flex bg-slate-100/80 p-1.5 rounded-2xl">
                <button id="tab-scan" class="flex-1 py-2.5 text-sm font-bold bg-white shadow-sm text-blue-600 rounded-xl transition-all flex items-center justify-center gap-2">
                    <i data-lucide="scan-line" class="w-4 h-4"></i> ลากคลุมจอ
                </button>
                <button id="tab-paste" class="flex-1 py-2.5 text-sm font-semibold text-slate-500 hover:text-slate-700 hover:bg-slate-200/50 rounded-xl transition-all flex items-center justify-center gap-2">
                    <i data-lucide="clipboard-paste" class="w-4 h-4"></i> วางรูปภาพ
                </button>
            </div>
        </div>

        <div class="p-6 pt-2 text-center">
            
            <!-- Panel 1: สแกนจากหน้าจอ (ลากคลุม) -->
            <div id="panel-scan" class="fade-in mt-2">
                <button id="btn-start-capture" class="w-full hover-float flex flex-col items-center justify-center gap-4 bg-white border-2 border-dashed border-slate-200 hover:border-blue-400 hover:bg-blue-50/30 rounded-3xl p-8 transition-all duration-300 group">
                    <div class="bg-slate-50 p-4 rounded-2xl group-hover:bg-blue-100 transition-colors shadow-sm">
                        <i data-lucide="crop" class="w-8 h-8 text-slate-400 group-hover:text-blue-600 transition-colors"></i>
                    </div>
                    <div>
                        <span class="block text-lg font-bold text-slate-700 group-hover:text-blue-700">คลิกเพื่อเริ่มสแกน</span>
                        <span class="block text-sm text-slate-400 mt-1 font-medium leading-relaxed">ระบบจะให้เลือกหน้าจอ<br>จากนั้นลากเมาส์คลุม QR ได้เลย</span>
                    </div>
                </button>
            </div>

            <!-- Panel 2: วางรูปภาพ (Ctrl+V) -->
            <div id="panel-paste" class="hidden fade-in mt-2">
                <div id="paste-area" class="border-2 border-dashed border-slate-200 rounded-3xl p-8 text-center bg-white transition-colors duration-300 flex flex-col items-center justify-center min-h-[220px]">
                    <div class="bg-slate-50 p-4 rounded-2xl mb-4 shadow-sm">
                        <i data-lucide="clipboard" class="w-8 h-8 text-slate-400"></i>
                    </div>
                    <p class="text-slate-600 font-bold text-lg mb-1">คลิกที่นี่ แล้วกด</p>
                    <div class="flex items-center justify-center gap-2 mt-2">
                        <kbd class="bg-slate-100 border border-slate-200 px-2.5 py-1.5 rounded-lg text-sm font-sans font-semibold text-slate-700 shadow-sm">Ctrl</kbd>
                        <span class="text-slate-400 font-medium">+</span>
                        <kbd class="bg-slate-100 border border-slate-200 px-2.5 py-1.5 rounded-lg text-sm font-sans font-semibold text-slate-700 shadow-sm">V</kbd>
                    </div>
                    <p class="text-slate-400 text-sm mt-3 font-medium">เพื่อวางรูปภาพที่คุณคัดลอกไว้</p>
                </div>
            </div>

            <!-- ข้อความแจ้งเตือนสถานะ -->
            <div id="status-message" class="hidden mt-4 p-3.5 rounded-xl text-sm text-center font-semibold border"></div>

            <!-- พื้นที่แสดงผลลัพธ์ -->
            <div id="result-area" class="hidden mt-6 text-left fade-in">
                <div class="flex items-center gap-2 mb-3 px-1">
                    <div class="w-1.5 h-4 bg-green-500 rounded-full"></div>
                    <p class="text-sm text-slate-600 font-bold">ผลลัพธ์จากรูปภาพ:</p>
                </div>
                
                <div class="bg-white border border-slate-100 shadow-[0_4px_20px_-4px_rgba(0,0,0,0.05)] rounded-2xl p-5">
                    
                    <!-- สำหรับข้อความธรรมดา -->
                    <div id="result-text-container" class="hidden">
                        <div class="flex items-start gap-3 bg-slate-50 p-4 rounded-xl">
                            <i data-lucide="file-text" class="w-5 h-5 text-slate-500 mt-0.5 shrink-0"></i>
                            <p id="result-text" class="text-slate-700 font-medium break-all"></p>
                        </div>
                    </div>

                    <!-- สำหรับลิงก์ (URL) -->
                    <div id="result-link-container" class="hidden">
                        <div class="flex flex-col gap-4">
                            <div class="flex items-center gap-2">
                                <span class="flex items-center justify-center w-6 h-6 rounded-full bg-green-100 text-green-600">
                                    <i data-lucide="check" class="w-3.5 h-3.5"></i>
                                </span>
                                <p class="text-sm text-green-700 font-bold">พบลิงก์เว็บไซต์พร้อมใช้งาน!</p>
                            </div>
                            
                            <!-- ปุ่มเปิดลิงก์แบบ Modern Dark -->
                            <a id="result-link" href="#" target="_blank" rel="noopener noreferrer" class="group relative flex items-center justify-center w-full gap-2 bg-slate-900 hover:bg-blue-600 text-white px-5 py-3.5 rounded-xl font-bold transition-all duration-300 shadow-lg hover:shadow-blue-500/25 overflow-hidden">
                                <span class="relative z-10 flex items-center gap-2">
                                    เปิดหน้าเว็บ <i data-lucide="external-link" class="w-4 h-4 group-hover:translate-x-0.5 group-hover:-translate-y-0.5 transition-transform"></i>
                                </span>
                            </a>
                            
                            <div class="bg-slate-50 p-3 rounded-lg border border-slate-100">
                                <p id="result-link-text" class="text-xs text-slate-500 font-mono break-all text-center"></p>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="mt-5 flex justify-center">
                    <div class="p-2 bg-white rounded-2xl shadow-sm border border-slate-100">
                        <img id="scanned-preview" class="max-h-24 object-contain rounded-xl" src="" alt="Scanned Image">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- โหมดลากคลุมหน้าจอ (Overlay แบบเต็มจอ) -->
    <div id="crop-overlay" class="hidden fixed inset-0 z-50 bg-slate-900/90 backdrop-blur-sm flex justify-center items-center select-none transition-opacity">
        <canvas id="crop-canvas" class="absolute top-0 left-0 w-full h-full"></canvas>
        
        <div class="absolute top-8 left-1/2 -translate-x-1/2 bg-white px-6 py-3.5 rounded-full shadow-2xl flex items-center gap-3 z-50 animate-bounce pointer-events-none border border-slate-100">
            <div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center">
                <i data-lucide="mouse-pointer-click" class="w-4 h-4 text-blue-600"></i>
            </div>
            <span class="font-bold text-slate-700">คลิกค้างแล้วลากคลุม QR Code</span>
        </div>
        
        <button id="btn-cancel-crop" class="absolute top-8 right-8 bg-white/10 hover:bg-red-500 text-white border border-white/20 hover:border-red-500 px-5 py-2.5 rounded-xl font-bold shadow-lg transition-all duration-300 flex items-center gap-2 z-50 backdrop-blur-md">
            <i data-lucide="x" class="w-4 h-4"></i> ยกเลิก
        </button>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();

            // UI Elements - Tabs
            const tabScan = document.getElementById('tab-scan');
            const tabPaste = document.getElementById('tab-paste');
            const panelScan = document.getElementById('panel-scan');
            const panelPaste = document.getElementById('panel-paste');
            const pasteArea = document.getElementById('paste-area');

            // UI Elements - Crop Tools
            const btnStartCapture = document.getElementById('btn-start-capture');
            const cropOverlay = document.getElementById('crop-overlay');
            const cropCanvas = document.getElementById('crop-canvas');
            const ctx = cropCanvas.getContext('2d');
            const btnCancelCrop = document.getElementById('btn-cancel-crop');
            
            // UI Elements - Results
            const statusMessage = document.getElementById('status-message');
            const resultArea = document.getElementById('result-area');
            const resultTextContainer = document.getElementById('result-text-container');
            const resultText = document.getElementById('result-text');
            const resultLinkContainer = document.getElementById('result-link-container');
            const resultLink = document.getElementById('result-link');
            const resultLinkText = document.getElementById('result-link-text');
            const scannedPreview = document.getElementById('scanned-preview');

            // State Variables
            let originalCapturedImage = null;
            let renderInfo = {};
            let isSelecting = false;
            let startX, startY, endX, endY;

            // --- Tab Switching Logic ---
            function switchTab(tabId) {
                hideResult();
                statusMessage.classList.add('hidden');

                const activeClasses = ['bg-white', 'shadow-sm', 'text-blue-600', 'font-bold'];
                const inactiveClasses = ['text-slate-500', 'hover:text-slate-700', 'hover:bg-slate-200/50', 'font-semibold'];

                if (tabId === 'scan') {
                    // Update Scan Tab
                    tabScan.classList.add(...activeClasses);
                    tabScan.classList.remove(...inactiveClasses);
                    // Update Paste Tab
                    tabPaste.classList.remove(...activeClasses);
                    tabPaste.classList.add(...inactiveClasses);
                    
                    panelScan.classList.remove('hidden');
                    panelPaste.classList.add('hidden');
                } else {
                    // Update Paste Tab
                    tabPaste.classList.add(...activeClasses);
                    tabPaste.classList.remove(...inactiveClasses);
                    // Update Scan Tab
                    tabScan.classList.remove(...activeClasses);
                    tabScan.classList.add(...inactiveClasses);
                    
                    panelPaste.classList.remove('hidden');
                    panelScan.classList.add('hidden');
                }
            }

            tabScan.addEventListener('click', () => switchTab('scan'));
            tabPaste.addEventListener('click', () => switchTab('paste'));

            // --- Mode 1: Paste Logic (Ctrl+V) ---
            window.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key === 'v') {
                    if (panelPaste.classList.contains('hidden')) {
                        switchTab('paste');
                    }
                    // Visual feedback modern
                    pasteArea.classList.add('bg-blue-50/50', 'border-blue-400', 'scale-[0.98]');
                    setTimeout(() => pasteArea.classList.remove('bg-blue-50/50', 'border-blue-400', 'scale-[0.98]'), 200);
                }
            });

            document.addEventListener('paste', (e) => {
                const items = (e.clipboardData || e.originalEvent.clipboardData).items;
                let imageItem = null;

                for (let i = 0; i < items.length; i++) {
                    if (items[i].type.indexOf('image') === 0) {
                        imageItem = items[i];
                        break;
                    }
                }

                if (!imageItem) {
                    if (!panelPaste.classList.contains('hidden')) {
                        showStatus('ไม่พบรูปภาพใน Clipboard กรุณาคัดลอกรูปภาพใหม่อีกครั้ง', 'error');
                    }
                    return;
                }

                switchTab('paste');
                
                const blob = imageItem.getAsFile();
                const reader = new FileReader();

                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const context = canvas.getContext('2d', { willReadFrequently: true });
                        canvas.width = img.width;
                        canvas.height = img.height;
                        context.drawImage(img, 0, 0, canvas.width, canvas.height);
                        
                        scannedPreview.src = img.src;
                        
                        const imageData = context.getImageData(0, 0, canvas.width, canvas.height);
                        readQRFromImageData(imageData);
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(blob);
            });

            // --- Mode 2: Screen Capture Logic ---
            btnStartCapture.addEventListener('click', async () => {
                hideResult();
                statusMessage.classList.add('hidden');
                
                try {
                    const stream = await navigator.mediaDevices.getDisplayMedia({ 
                        video: { preferCurrentTab: false } 
                    });
                    
                    const video = document.createElement('video');
                    video.srcObject = stream;
                    video.muted = true;
                    await video.play();

                    await new Promise(resolve => setTimeout(resolve, 300));

                    const vWidth = video.videoWidth;
                    const vHeight = video.videoHeight;

                    originalCapturedImage = document.createElement('canvas');
                    originalCapturedImage.width = vWidth;
                    originalCapturedImage.height = vHeight;
                    const origCtx = originalCapturedImage.getContext('2d');
                    origCtx.drawImage(video, 0, 0, vWidth, vHeight);

                    stream.getTracks().forEach(track => track.stop());

                    openCropOverlay();
                } catch (err) {
                    console.error("Screen Capture Error:", err);
                    showStatus('ยกเลิกการแชร์หน้าจอแล้ว', 'error');
                }
            });

            function openCropOverlay() {
                document.body.classList.add('cropping');
                cropOverlay.classList.remove('hidden');
                resizeCanvas();
                window.addEventListener('resize', resizeCanvas);
            }

            function closeCropOverlay() {
                document.body.classList.remove('cropping');
                cropOverlay.classList.add('hidden');
                window.removeEventListener('resize', resizeCanvas);
                isSelecting = false;
                startX = startY = endX = endY = undefined;
            }

            btnCancelCrop.addEventListener('click', closeCropOverlay);

            function resizeCanvas() {
                if (!originalCapturedImage) return;
                cropCanvas.width = window.innerWidth;
                cropCanvas.height = window.innerHeight;

                const scale = Math.min(cropCanvas.width / originalCapturedImage.width, cropCanvas.height / originalCapturedImage.height);
                const drawWidth = originalCapturedImage.width * scale;
                const drawHeight = originalCapturedImage.height * scale;
                const drawX = (cropCanvas.width - drawWidth) / 2;
                const drawY = (cropCanvas.height - drawHeight) / 2;

                renderInfo = { scale, drawX, drawY, drawWidth, drawHeight };
                drawCropInterface();
            }

            function drawCropInterface() {
                if (!originalCapturedImage) return;

                ctx.clearRect(0, 0, cropCanvas.width, cropCanvas.height);
                ctx.drawImage(originalCapturedImage, renderInfo.drawX, renderInfo.drawY, renderInfo.drawWidth, renderInfo.drawHeight);

                ctx.fillStyle = 'rgba(15, 23, 42, 0.7)'; // สี Overlay ทันสมัยขึ้น
                ctx.fillRect(0, 0, cropCanvas.width, cropCanvas.height);

                if (startX !== undefined && endX !== undefined) {
                    const rectX = Math.min(startX, endX);
                    const rectY = Math.min(startY, endY);
                    const rectW = Math.abs(startX - endX);
                    const rectH = Math.abs(startY - endY);

                    ctx.save();
                    ctx.beginPath();
                    // มุมโค้งตอน Crop
                    ctx.roundRect ? ctx.roundRect(rectX, rectY, rectW, rectH, 8) : ctx.rect(rectX, rectY, rectW, rectH);
                    ctx.clip();
                    ctx.drawImage(originalCapturedImage, renderInfo.drawX, renderInfo.drawY, renderInfo.drawWidth, renderInfo.drawHeight);
                    ctx.restore();

                    // เส้นประสีฟ้าสว่าง
                    ctx.strokeStyle = '#3b82f6';
                    ctx.lineWidth = 2;
                    ctx.setLineDash([6, 6]);
                    ctx.lineDashOffset = Date.now() / 20; // Animate เส้นประ
                    if(ctx.roundRect) {
                        ctx.beginPath();
                        ctx.roundRect(rectX, rectY, rectW, rectH, 8);
                        ctx.stroke();
                    } else {
                        ctx.strokeRect(rectX, rectY, rectW, rectH);
                    }
                    
                    // มุมจับ (Corners)
                    ctx.setLineDash([]);
                    ctx.lineWidth = 4;
                    ctx.strokeStyle = '#fff';
                    const cornerSize = 16;
                    
                    ctx.beginPath();
                    // บนซ้าย
                    ctx.moveTo(rectX, rectY + cornerSize); ctx.lineTo(rectX, rectY); ctx.lineTo(rectX + cornerSize, rectY);
                    // บนขวา
                    ctx.moveTo(rectX + rectW - cornerSize, rectY); ctx.lineTo(rectX + rectW, rectY); ctx.lineTo(rectX + rectW, rectY + cornerSize);
                    // ล่างขวา
                    ctx.moveTo(rectX + rectW, rectY + rectH - cornerSize); ctx.lineTo(rectX + rectW, rectY + rectH); ctx.lineTo(rectX + rectW - cornerSize, rectY + rectH);
                    // ล่างซ้าย
                    ctx.moveTo(rectX + cornerSize, rectY + rectH); ctx.lineTo(rectX, rectY + rectH); ctx.lineTo(rectX, rectY + rectH - cornerSize);
                    ctx.stroke();
                }
                
                if (isSelecting) {
                    requestAnimationFrame(drawCropInterface); // ให้เส้นประขยับได้
                }
            }

            cropCanvas.addEventListener('mousedown', (e) => {
                isSelecting = true;
                startX = e.clientX;
                startY = e.clientY;
                endX = e.clientX;
                endY = e.clientY;
                drawCropInterface();
            });

            cropCanvas.addEventListener('mousemove', (e) => {
                if (!isSelecting) return;
                endX = e.clientX;
                endY = e.clientY;
            });

            cropCanvas.addEventListener('mouseup', () => {
                if (!isSelecting) return;
                isSelecting = false;

                const width = Math.abs(startX - endX);
                const height = Math.abs(startY - endY);

                if (width > 20 && height > 20) {
                    processCroppedArea(Math.min(startX, endX), Math.min(startY, endY), width, height);
                } else {
                    startX = startY = endX = endY = undefined;
                    drawCropInterface();
                }
            });

            function processCroppedArea(x, y, w, h) {
                const origX = (x - renderInfo.drawX) / renderInfo.scale;
                const origY = (y - renderInfo.drawY) / renderInfo.scale;
                const origW = w / renderInfo.scale;
                const origH = h / renderInfo.scale;

                const safeX = Math.max(0, origX);
                const safeY = Math.max(0, origY);
                const safeW = Math.min(originalCapturedImage.width - safeX, origW);
                const safeH = Math.min(originalCapturedImage.height - safeY, origH);

                if (safeW <= 0 || safeH <= 0) {
                    closeCropOverlay();
                    showStatus('พื้นที่ที่เลือกไม่ถูกต้อง', 'error');
                    return;
                }

                const snippetCanvas = document.createElement('canvas');
                snippetCanvas.width = safeW;
                snippetCanvas.height = safeH;
                const snippetCtx = snippetCanvas.getContext('2d');
                
                snippetCtx.drawImage(originalCapturedImage, safeX, safeY, safeW, safeH, 0, 0, safeW, safeH);

                scannedPreview.src = snippetCanvas.toDataURL('image/png');
                const imageData = snippetCtx.getImageData(0, 0, safeW, safeH);
                
                closeCropOverlay();
                readQRFromImageData(imageData);
            }

            // --- Shared QR Code Reading Logic ---
            function readQRFromImageData(imageData) {
                let code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: "dontInvert" });
                if (!code) {
                    code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: "attemptBoth" });
                }

                if (code) {
                    displayResult(code.data);
                } else {
                    showStatus('ไม่พบ QR Code ในภาพ ลองใหม่อีกครั้ง', 'error');
                }
            }

            // --- UI Helper Functions ---
            function displayResult(text) {
                statusMessage.classList.add('hidden');
                resultArea.classList.remove('hidden');

                const urlRegex = /^(https?:\/\/[^\s]+)/i;
                
                if (urlRegex.test(text)) {
                    resultTextContainer.classList.add('hidden');
                    resultLinkContainer.classList.remove('hidden');
                    resultLink.href = text;
                    resultLinkText.textContent = text;
                } else {
                    resultLinkContainer.classList.add('hidden');
                    resultTextContainer.classList.remove('hidden');
                    resultText.textContent = text;
                }
            }

            function hideResult() {
                resultArea.classList.add('hidden');
            }

            function showStatus(msg, type) {
                statusMessage.textContent = msg;
                statusMessage.className = type === 'error' 
                    ? 'mt-4 p-3.5 rounded-xl text-sm text-center font-bold bg-red-50 text-red-600 border border-red-100 fade-in'
                    : 'mt-4 p-3.5 rounded-xl text-sm text-center font-bold bg-blue-50 text-blue-600 border border-blue-100 fade-in';
                statusMessage.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
