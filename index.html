<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="เครื่องมือสแกน QR Code ใช้งานง่าย รองรับทั้งการลากคลุมหน้าจอและการวางรูปภาพ (Ctrl+V)">
    <meta property="og:title" content="สแกน QR Code บนเว็บ">
    <meta property="og:description" content="สแกน QR Code ได้ทันทีด้วยการลากคลุมจอ หรือกด Ctrl+V วางรูปภาพ">
    <meta property="og:type" content="website">
    
    <title>เครื่องมือสแกน QR Code (ลากคลุม & วางภาพ)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* ซ่อน Scrollbar เมื่อเปิดโหมดสแกนเต็มจอ */
        body.cropping { overflow: hidden; }
        
        #crop-canvas {
            cursor: crosshair;
            display: block;
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex flex-col items-center justify-center p-4 font-sans text-slate-800 transition-colors">

    <!-- หน้าต่างหลัก -->
    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden relative z-10">
        <div class="bg-blue-600 p-6 text-white text-center">
            <i data-lucide="qr-code" class="w-12 h-12 mx-auto mb-3 opacity-90"></i>
            <h1 class="text-2xl font-bold">ตัวสแกน QR Code</h1>
            <p class="text-blue-100 text-sm mt-1">เลือกวิธีสแกนที่คุณต้องการด้านล่าง</p>
        </div>

        <!-- แท็บเมนู -->
        <div class="flex border-b border-slate-200 bg-slate-50">
            <button id="tab-scan" class="flex-1 py-3 text-sm font-semibold text-blue-600 border-b-2 border-blue-600 transition-colors flex items-center justify-center gap-2">
                <i data-lucide="scan-line" class="w-4 h-4"></i> สแกนหน้าจอ
            </button>
            <button id="tab-paste" class="flex-1 py-3 text-sm font-semibold text-slate-500 border-b-2 border-transparent hover:text-slate-700 transition-colors flex items-center justify-center gap-2">
                <i data-lucide="clipboard-paste" class="w-4 h-4"></i> วางรูปภาพ
            </button>
        </div>

        <div class="p-6 text-center">
            
            <!-- Panel 1: สแกนจากหน้าจอ (ลากคลุม) -->
            <div id="panel-scan" class="fade-in">
                <button id="btn-start-capture" class="w-full flex flex-col items-center justify-center gap-3 bg-slate-50 hover:bg-blue-50 border-2 border-dashed border-slate-300 hover:border-blue-400 text-slate-600 hover:text-blue-600 rounded-xl p-8 transition-all duration-200 group">
                    <div class="bg-white p-4 rounded-full shadow-sm group-hover:scale-110 transition-transform">
                        <i data-lucide="crop" class="w-8 h-8 text-blue-500"></i>
                    </div>
                    <div>
                        <span class="block text-lg font-semibold">คลิกเพื่อเริ่มสแกน</span>
                        <span class="block text-sm text-slate-400 mt-1">เลือกหน้าจอ แล้วลากคลุมบริเวณ QR Code</span>
                    </div>
                </button>
            </div>

            <!-- Panel 2: วางรูปภาพ (Ctrl+V) -->
            <div id="panel-paste" class="hidden fade-in">
                <div id="paste-area" class="border-2 border-dashed border-slate-300 rounded-xl p-8 text-center bg-slate-50 transition-colors duration-200 flex flex-col items-center justify-center">
                    <i data-lucide="clipboard" class="w-10 h-10 text-slate-400 mb-3"></i>
                    <p class="text-slate-600 font-medium">คลิกที่นี่ แล้วกด <kbd class="bg-slate-200 px-2 py-1 rounded text-sm font-mono text-slate-700">Ctrl</kbd> + <kbd class="bg-slate-200 px-2 py-1 rounded text-sm font-mono text-slate-700">V</kbd></p>
                    <p class="text-slate-400 text-sm mt-2">เพื่อวางรูปภาพที่คัดลอกมา</p>
                </div>
            </div>

            <!-- ข้อความแจ้งเตือนสถานะ -->
            <div id="status-message" class="hidden mt-4 p-3 rounded-lg text-sm text-center font-medium"></div>

            <!-- พื้นที่แสดงผลลัพธ์ (ใช้ร่วมกันทั้ง 2 โหมด) -->
            <div id="result-area" class="hidden mt-6 text-left fade-in">
                <p class="text-sm text-slate-500 mb-2 font-medium">ผลลัพธ์จาก QR Code:</p>
                <div class="bg-green-50 border border-green-200 rounded-xl p-4">
                    
                    <!-- สำหรับข้อความธรรมดา -->
                    <div id="result-text-container" class="hidden">
                        <div class="flex items-start gap-3">
                            <i data-lucide="file-text" class="w-5 h-5 text-green-600 mt-0.5 shrink-0"></i>
                            <p id="result-text" class="text-slate-700 break-all"></p>
                        </div>
                    </div>

                    <!-- สำหรับลิงก์ (URL) -->
                    <div id="result-link-container" class="hidden">
                        <div class="flex items-start gap-3">
                            <i data-lucide="link" class="w-5 h-5 text-blue-600 mt-0.5 shrink-0"></i>
                            <div class="w-full">
                                <p class="text-sm text-green-700 mb-2 font-medium">พบลิงก์เว็บไซต์!</p>
                                <a id="result-link" href="#" target="_blank" rel="noopener noreferrer" class="inline-flex items-center justify-center w-full gap-2 bg-blue-600 hover:bg-blue-700 text-white px-4 py-3 rounded-lg font-medium transition-colors shadow-md hover:shadow-lg">
                                    <span>เปิดหน้าเว็บ</span>
                                    <i data-lucide="external-link" class="w-4 h-4"></i>
                                </a>
                                <p id="result-link-text" class="text-xs text-slate-500 mt-3 break-all text-center"></p>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="mt-4 flex justify-center">
                    <img id="scanned-preview" class="max-h-32 object-contain border border-slate-200 rounded-lg shadow-sm bg-slate-50" src="" alt="Scanned Image">
                </div>
            </div>
        </div>
    </div>

    <!-- โหมดลากคลุมหน้าจอ (Overlay แบบเต็มจอ) -->
    <div id="crop-overlay" class="hidden fixed inset-0 z-50 bg-black flex justify-center items-center select-none">
        <canvas id="crop-canvas" class="absolute top-0 left-0 w-full h-full"></canvas>
        
        <div class="absolute top-6 left-1/2 -translate-x-1/2 bg-white/90 backdrop-blur-sm px-6 py-3 rounded-full shadow-2xl flex items-center gap-4 z-50 animate-bounce pointer-events-none">
            <i data-lucide="mouse-pointer-click" class="w-5 h-5 text-blue-600"></i>
            <span class="font-medium text-slate-800">คลิกค้างแล้วลากคลุม บริเวณ QR Code</span>
        </div>
        
        <button id="btn-cancel-crop" class="absolute top-6 right-6 bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg font-medium shadow-lg transition-colors flex items-center gap-2 z-50">
            <i data-lucide="x" class="w-4 h-4"></i> ยกเลิก
        </button>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();

            // UI Elements - Tabs
            const tabScan = document.getElementById('tab-scan');
            const tabPaste = document.getElementById('tab-paste');
            const panelScan = document.getElementById('panel-scan');
            const panelPaste = document.getElementById('panel-paste');
            const pasteArea = document.getElementById('paste-area');

            // UI Elements - Crop Tools
            const btnStartCapture = document.getElementById('btn-start-capture');
            const cropOverlay = document.getElementById('crop-overlay');
            const cropCanvas = document.getElementById('crop-canvas');
            const ctx = cropCanvas.getContext('2d');
            const btnCancelCrop = document.getElementById('btn-cancel-crop');
            
            // UI Elements - Results
            const statusMessage = document.getElementById('status-message');
            const resultArea = document.getElementById('result-area');
            const resultTextContainer = document.getElementById('result-text-container');
            const resultText = document.getElementById('result-text');
            const resultLinkContainer = document.getElementById('result-link-container');
            const resultLink = document.getElementById('result-link');
            const resultLinkText = document.getElementById('result-link-text');
            const scannedPreview = document.getElementById('scanned-preview');

            // State Variables
            let originalCapturedImage = null;
            let renderInfo = {};
            let isSelecting = false;
            let startX, startY, endX, endY;

            // --- Tab Switching Logic ---
            function switchTab(tabId) {
                hideResult();
                statusMessage.classList.add('hidden');

                if (tabId === 'scan') {
                    // Set active style for scan
                    tabScan.classList.add('text-blue-600', 'border-blue-600');
                    tabScan.classList.remove('text-slate-500', 'border-transparent');
                    // Set inactive style for paste
                    tabPaste.classList.remove('text-blue-600', 'border-blue-600');
                    tabPaste.classList.add('text-slate-500', 'border-transparent');
                    // Show/Hide panels
                    panelScan.classList.remove('hidden');
                    panelPaste.classList.add('hidden');
                } else {
                    // Set active style for paste
                    tabPaste.classList.add('text-blue-600', 'border-blue-600');
                    tabPaste.classList.remove('text-slate-500', 'border-transparent');
                    // Set inactive style for scan
                    tabScan.classList.remove('text-blue-600', 'border-blue-600');
                    tabScan.classList.add('text-slate-500', 'border-transparent');
                    // Show/Hide panels
                    panelPaste.classList.remove('hidden');
                    panelScan.classList.add('hidden');
                }
            }

            tabScan.addEventListener('click', () => switchTab('scan'));
            tabPaste.addEventListener('click', () => switchTab('paste'));

            // --- Mode 1: Paste Logic (Ctrl+V) ---
            window.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key === 'v') {
                    if (panelPaste.classList.contains('hidden')) {
                        switchTab('paste');
                    }
                    pasteArea.classList.add('bg-blue-50', 'border-blue-400');
                    setTimeout(() => pasteArea.classList.remove('bg-blue-50', 'border-blue-400'), 300);
                }
            });

            document.addEventListener('paste', (e) => {
                const items = (e.clipboardData || e.originalEvent.clipboardData).items;
                let imageItem = null;

                for (let i = 0; i < items.length; i++) {
                    if (items[i].type.indexOf('image') === 0) {
                        imageItem = items[i];
                        break;
                    }
                }

                if (!imageItem) {
                    // แจ้งเตือนเฉพาะถ้าผู้ใช้อยู่ในหน้าวางรูปภาพอยู่แล้ว
                    if (!panelPaste.classList.contains('hidden')) {
                        showStatus('ไม่พบรูปภาพใน Clipboard กรุณาแน่ใจว่าได้คัดลอกรูปภาพมาแล้ว', 'error');
                    }
                    return;
                }

                // สลับมาหน้า Paste อัตโนมัติและเคลียร์จอ
                switchTab('paste');
                
                const blob = imageItem.getAsFile();
                const reader = new FileReader();

                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const context = canvas.getContext('2d', { willReadFrequently: true });
                        canvas.width = img.width;
                        canvas.height = img.height;
                        context.drawImage(img, 0, 0, canvas.width, canvas.height);
                        
                        scannedPreview.src = img.src; // แสดงภาพที่วาง
                        
                        const imageData = context.getImageData(0, 0, canvas.width, canvas.height);
                        readQRFromImageData(imageData);
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(blob);
            });

            // --- Mode 2: Screen Capture Logic ---
            btnStartCapture.addEventListener('click', async () => {
                hideResult();
                statusMessage.classList.add('hidden');
                
                try {
                    const stream = await navigator.mediaDevices.getDisplayMedia({ 
                        video: { preferCurrentTab: false } 
                    });
                    
                    const video = document.createElement('video');
                    video.srcObject = stream;
                    video.muted = true;
                    await video.play();

                    await new Promise(resolve => setTimeout(resolve, 300)); // รอเฟรมแรก

                    const vWidth = video.videoWidth;
                    const vHeight = video.videoHeight;

                    originalCapturedImage = document.createElement('canvas');
                    originalCapturedImage.width = vWidth;
                    originalCapturedImage.height = vHeight;
                    const origCtx = originalCapturedImage.getContext('2d');
                    origCtx.drawImage(video, 0, 0, vWidth, vHeight);

                    stream.getTracks().forEach(track => track.stop()); // หยุดแชร์จอ

                    openCropOverlay();
                } catch (err) {
                    console.error("Screen Capture Error:", err);
                    showStatus('ยกเลิกการแชร์หน้าจอ หรือเบราว์เซอร์ไม่รองรับ', 'error');
                }
            });

            function openCropOverlay() {
                document.body.classList.add('cropping');
                cropOverlay.classList.remove('hidden');
                resizeCanvas();
                window.addEventListener('resize', resizeCanvas);
            }

            function closeCropOverlay() {
                document.body.classList.remove('cropping');
                cropOverlay.classList.add('hidden');
                window.removeEventListener('resize', resizeCanvas);
                isSelecting = false;
                startX = startY = endX = endY = undefined;
            }

            btnCancelCrop.addEventListener('click', closeCropOverlay);

            function resizeCanvas() {
                if (!originalCapturedImage) return;
                cropCanvas.width = window.innerWidth;
                cropCanvas.height = window.innerHeight;

                const scale = Math.min(cropCanvas.width / originalCapturedImage.width, cropCanvas.height / originalCapturedImage.height);
                const drawWidth = originalCapturedImage.width * scale;
                const drawHeight = originalCapturedImage.height * scale;
                const drawX = (cropCanvas.width - drawWidth) / 2;
                const drawY = (cropCanvas.height - drawHeight) / 2;

                renderInfo = { scale, drawX, drawY, drawWidth, drawHeight };
                drawCropInterface();
            }

            function drawCropInterface() {
                if (!originalCapturedImage) return;

                ctx.clearRect(0, 0, cropCanvas.width, cropCanvas.height);
                ctx.drawImage(originalCapturedImage, renderInfo.drawX, renderInfo.drawY, renderInfo.drawWidth, renderInfo.drawHeight);

                ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
                ctx.fillRect(0, 0, cropCanvas.width, cropCanvas.height);

                if (startX !== undefined && endX !== undefined) {
                    const rectX = Math.min(startX, endX);
                    const rectY = Math.min(startY, endY);
                    const rectW = Math.abs(startX - endX);
                    const rectH = Math.abs(startY - endY);

                    ctx.save();
                    ctx.beginPath();
                    ctx.rect(rectX, rectY, rectW, rectH);
                    ctx.clip();
                    ctx.drawImage(originalCapturedImage, renderInfo.drawX, renderInfo.drawY, renderInfo.drawWidth, renderInfo.drawHeight);
                    ctx.restore();

                    ctx.strokeStyle = '#3b82f6';
                    ctx.lineWidth = 2;
                    ctx.setLineDash([5, 5]);
                    ctx.strokeRect(rectX, rectY, rectW, rectH);
                    
                    ctx.setLineDash([]);
                    ctx.lineWidth = 4;
                    const cornerSize = 10;
                    ctx.strokeRect(rectX-2, rectY-2, cornerSize, cornerSize); 
                    ctx.strokeRect(rectX+rectW-cornerSize+2, rectY-2, cornerSize, cornerSize);
                    ctx.strokeRect(rectX-2, rectY+rectH-cornerSize+2, cornerSize, cornerSize);
                    ctx.strokeRect(rectX+rectW-cornerSize+2, rectY+rectH-cornerSize+2, cornerSize, cornerSize);
                }
            }

            cropCanvas.addEventListener('mousedown', (e) => {
                isSelecting = true;
                startX = e.clientX;
                startY = e.clientY;
                endX = e.clientX;
                endY = e.clientY;
                drawCropInterface();
            });

            cropCanvas.addEventListener('mousemove', (e) => {
                if (!isSelecting) return;
                endX = e.clientX;
                endY = e.clientY;
                drawCropInterface();
            });

            cropCanvas.addEventListener('mouseup', () => {
                if (!isSelecting) return;
                isSelecting = false;

                const width = Math.abs(startX - endX);
                const height = Math.abs(startY - endY);

                if (width > 20 && height > 20) {
                    processCroppedArea(Math.min(startX, endX), Math.min(startY, endY), width, height);
                } else {
                    startX = startY = endX = endY = undefined;
                    drawCropInterface();
                }
            });

            function processCroppedArea(x, y, w, h) {
                const origX = (x - renderInfo.drawX) / renderInfo.scale;
                const origY = (y - renderInfo.drawY) / renderInfo.scale;
                const origW = w / renderInfo.scale;
                const origH = h / renderInfo.scale;

                const safeX = Math.max(0, origX);
                const safeY = Math.max(0, origY);
                const safeW = Math.min(originalCapturedImage.width - safeX, origW);
                const safeH = Math.min(originalCapturedImage.height - safeY, origH);

                if (safeW <= 0 || safeH <= 0) {
                    closeCropOverlay();
                    showStatus('พื้นที่ที่เลือกไม่ถูกต้อง', 'error');
                    return;
                }

                const snippetCanvas = document.createElement('canvas');
                snippetCanvas.width = safeW;
                snippetCanvas.height = safeH;
                const snippetCtx = snippetCanvas.getContext('2d');
                
                snippetCtx.drawImage(originalCapturedImage, safeX, safeY, safeW, safeH, 0, 0, safeW, safeH);

                scannedPreview.src = snippetCanvas.toDataURL('image/png'); // แสดงภาพที่ลากคลุม
                const imageData = snippetCtx.getImageData(0, 0, safeW, safeH);
                
                closeCropOverlay();
                readQRFromImageData(imageData);
            }

            // --- Shared QR Code Reading Logic ---
            function readQRFromImageData(imageData) {
                let code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: "dontInvert" });
                if (!code) {
                    code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: "attemptBoth" });
                }

                if (code) {
                    displayResult(code.data);
                } else {
                    showStatus('ไม่พบ QR Code ในภาพ หรือภาพอาจเบลอ/เล็กเกินไป กรุณาลองใหม่อีกครั้ง', 'error');
                }
            }

            // --- UI Helper Functions ---
            function displayResult(text) {
                statusMessage.classList.add('hidden');
                resultArea.classList.remove('hidden');

                const urlRegex = /^(https?:\/\/[^\s]+)/i;
                
                if (urlRegex.test(text)) {
                    resultTextContainer.classList.add('hidden');
                    resultLinkContainer.classList.remove('hidden');
                    resultLink.href = text;
                    resultLinkText.textContent = text;
                } else {
                    resultLinkContainer.classList.add('hidden');
                    resultTextContainer.classList.remove('hidden');
                    resultText.textContent = text;
                }
            }

            function hideResult() {
                resultArea.classList.add('hidden');
            }

            function showStatus(msg, type) {
                statusMessage.textContent = msg;
                statusMessage.className = type === 'error' 
                    ? 'mt-4 p-3 rounded-lg text-sm text-center font-medium bg-red-50 text-red-600 border border-red-200 fade-in'
                    : 'mt-4 p-3 rounded-lg text-sm text-center font-medium bg-blue-50 text-blue-600 border border-blue-200 fade-in';
                statusMessage.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
